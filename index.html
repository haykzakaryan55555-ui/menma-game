<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menma Game - Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Սպիտակ ֆոն */
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            width: 350px;
            padding: 40px;
            background: #ffffff;
            border: 4px solid #bd00ff;
            box-shadow: 0 0 20px rgba(189, 0, 255, 0.4);
            transform: skewX(-10deg); /* Թեքված ստիլ */
            text-align: center;
            position: relative;
        }

        /* Ներսի էլեմենտները հետ ենք թեքում, որ ուղիղ երևան */
        .inner-content {
            transform: skewX(10deg);
        }

        h2 {
            color: #20013b;
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #00ffff;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: #bd00ff;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #f0f0f0;
            border: 2px solid #20013b;
            font-family: inherit;
            font-size: 14px;
            color: #20013b;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #bd00ff;
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(189, 0, 255, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #bd00ff, #0072ff);
            color: white;
            border: 2px solid #20013b;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 1px;
            box-shadow: 0 4px 0px #20013b;
            transition: 0.2s;
        }

        .login-btn:text-hover {
            opacity: 0.9;
        }

        .login-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .error-message {
            color: #ff5858;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="inner-content">
            <h2>MENMA LAUNCHER</h2>
            
            <div class="input-group">
                <label>LOGIN</label>
                <input type="text" id="username" placeholder="Մուտքանուն">
            </div>

            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="Գաղտնաբառ">
            </div>

            <button class="login-btn" onclick="checkLogin()">ENTER GAME</button>
            <div class="error-message" id="error-box">Սխալ լոգին կամ գաղտնաբառ։</div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('error-box');

            // Առայժմ դնում ենք պարզ ստուգում, հետագայում սա էլ կկապենք Firebase-ի հետ
            if (user === "admin" && pass === "menma2026") {
                errorBox.style.display = "none";
                // Ճիշտ լինելու դեպքում տանում է դեպի Մենյուի էջ
                window.location.href = "menu.html";
            } else if (user === "player" && pass === "12345") {
                errorBox.style.display = "none";
                window.location.href = "menu.html";
            } else {
                errorBox.style.display = "block";
            }
        }
    </script>

</body>
</html>
