<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menma Game - HUD</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            font-family: 'Arial Black', Gadget, sans-serif;
            user-select: none;
        }

        /* Գլխավոր HUD կոնտեյներ */
        .hud-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
        }

        /* Խաղացողների ընդհանուր ստիլը */
        .player-block {
            width: 420px;
            position: relative;
        }

        /* Շեղված կապույտ/կարմիր դիզայն հիմքը */
        .hud-main {
            height: 65px;
            transform: skewX(-15deg);
            border: 4px solid #20013b;
            position: relative;
            box-shadow: 0 5px 0px #000;
        }

        .p1 .hud-main { background: linear-gradient(to right, #0055ff, #002288); }
        .p2 .hud-main { background: linear-gradient(to left, #ff2222, #880000); }

        /* Անունների դիրքը (ներսում, թեքությունը ուղղած) */
        .player-name {
            position: absolute;
            top: 5px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000;
            transform: skewX(15deg);
        }
        .p1 .player-name { left: 90px; }
        .p2 .player-name { right: 90px; }

        /* Կյանքի սանդղակ (HP Bar) */
        .hp-bar-bg {
            position: absolute;
            bottom: 8px;
            width: 280px;
            height: 16px;
            background-color: #444;
            border: 2px solid #000;
            transform: skewX(15deg);
            overflow: hidden;
        }
        .p1 .hp-bar-bg { left: 90px; }
        .p2 .hp-bar-bg { right: 90px; }

        .hp-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(to bottom, #ffea00, #ffaa00);
            transition: width 0.3s ease;
        }

        /* Ավատարի շրջանակը */
        .avatar-frame {
            position: absolute;
            top: -5px;
            width: 75px;
            height: 75px;
            background-color: #f0f0f0;
            border: 4px solid #20013b;
            transform: skewX(-15deg);
            box-shadow: 3px 5px 0px #000;
            overflow: hidden;
            z-index: 2;
        }
        .p1 .avatar-frame { left: 0; }
        .p2 .avatar-frame { right: 0; }

        .avatar-img {
            width: 130%;
            height: 130%;
            margin-left: -15%;
            margin-top: -15%;
            transform: skewX(15deg);
            object-fit: cover;
        }
        /* Ինվերսիա միայն աջ կողմի (Player 2) նկարի համար */
        .p2 .avatar-img {
            transform: skewX(15deg) scaleX(-1);
        }

        /* Ընդհանուր սրտիկներ (Կենտրոնում) */
        .global-lives {
            text-align: center;
            background: #fff;
            border: 4px solid #20013b;
            padding: 10px 20px;
            transform: skewX(-15deg);
            box-shadow: 0 5px 0px #000;
        }
        .global-lives-content {
            transform: skewX(15deg);
            font-size: 18px;
            color: #20013b;
        }
        .hearts-container {
            font-size: 24px;
            color: #ff2222;
            margin-top: 5px;
        }

        /* Զոմբիների հաշվիչ */
        .zombie-counter {
            margin-top: 15px;
            background: #000;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 5px 15px;
            font-size: 16px;
            text-align: center;
            box-shadow: 0 0 10px #00ffcc;
        }

        /* ԲՈՍՍԻ HUD */
        .boss-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            display: none; /* Ավտոմատ փակ է, կբացվի ադմինից */
            flex-direction: column;
            align-items: flex-end;
        }
        .boss-name {
            color: #fff;
            font-size: 20px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0px #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            align-self: flex-start;
            padding-left: 20px;
        }
        .boss-hp-bg {
            width: 100%;
            height: 20px;
            background-color: #333;
            border: 4px solid #20013b;
            transform: skewX(-20deg);
            box-shadow: 0 4px 0px #000;
            overflow: hidden;
        }
        .boss-hp-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(to bottom, #bd00ff, #73009c);
            transition: width 0.2s ease;
            float: right; /* Կյանքերը պակասում են աջից ձախ */
        }
    </style>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="hud-container">
        
        <!-- PLAYER 1 (Ձախ) -->
        <div class="player-block p1">
            <div class="avatar-frame">
                <img src="p1.png" alt="P1" class="avatar-img" onerror="this.src='https://via.placeholder.com/100?text=P1'">
            </div>
            <div class="hud-main">
                <div class="player-name">LEONARDO</div>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="p1-hp"></div>
                </div>
            </div>
        </div>

        <!-- ԿԵՆՏՐՈՆԱԿԱՆ ՄԱՍ (Lives & Zombies) -->
        <div style="display: flex; flex-direction: column; align-items: center; width: 250px;">
            <div class="global-lives">
                <div class="global-lives-content">
                    <div>LIVES</div>
                    <div class="hearts-container" id="hearts-box">❤❤❤❤浅</div>
                </div>
            </div>
            <div class="zombie-counter">
                ZOMBIES: <span id="zombie-count">--</span>
            </div>
        </div>

        <!-- PLAYER 2 (Աջ) -->
        <div class="player-block p2">
            <div class="avatar-frame">
                <img src="p2.png" alt="P2" class="avatar-img" onerror="this.src='https://via.placeholder.com/100?text=P2'">
            </div>
            <div class="hud-main">
                <div class="player-name">RAPHAEL</div>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="p2-hp"></div>
                </div>
            </div>
        </div>

    </div>

    <!-- ԲՈՍՍԻ ԲԱԺԻՆ -->
    <div class="boss-container" id="boss-hud">
        <div class="boss-name" id="boss-name-text">SHREDDER</div>
        <div class="boss-hp-bg">
            <div class="boss-hp-fill" id="boss-hp-bar"></div>
        </div>
    </div>

    <script>
        // Քո անձնական Firebase կոնֆիգուրացիան
        const firebaseConfig = {
            apiKey: "AIzaSyBitQi_YfwyNKSrs8XTgBjiC7QbegxVVeM",
            authDomain: "menma-game.firebaseapp.com",
            databaseURL: "https://menma-game-default-rtdb.firebaseio.com",
            projectId: "menma-game",
            storageBucket: "menma-game.firebasestorage.app",
            messagingSenderId: "188499290563",
            appId: "1:188499290563:web:b627805978494331e83576"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('gameState');

        // Ռեալ ժամանակում լսում ենք ադմինի փոփոխությունները
        db.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // 1. Թարմացնում ենք Խաղացողների HP-ն
            document.getElementById('p1-hp').style.width = data.p1Hp + '%';
            document.getElementById('p2-hp').style.width = data.p2Hp + '%';

            // 2. Թարմացնում ենք Զոմբիների քանակը
            document.getElementById('zombie-count').innerText = data.zombiesLeft;

            // 3. Թարմացնում ենք Սրտիկները (Lives)
            let heartsHtml = '';
            for (let i = 0; i < data.lives; i++) {
                heartsHtml += '❤';
            }
            document.getElementById('hearts-box').innerHTML = heartsHtml || '🔥 GAME OVER';

            // 4. Բոսսի տրամաբանությունը
            const bossHud = document.getElementById('boss-hud');
            if (data.boss && data.boss.active) {
                bossHud.style.display = 'flex';
                document.getElementById('boss-name-text').innerText = data.boss.name;
                
                // Հաշվում ենք տոկոսը
                let pct = (data.boss.currentHp / data.boss.maxHp) * 100;
                document.getElementById('boss-hp-bar').style.width = pct + '%';
            } else {
                bossHud.style.display = 'none';
            }
        });
    </script>
</body>
</html>
